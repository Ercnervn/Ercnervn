# .github/workflows/snake.yml
# Katkı grafiğini "yiyen" yılan animasyonunu üretir ve `output` dalına gönderir.
# Generates the contribution-eating snake animation and pushes it to the `output` branch.

name: Generate Snake Animation

on:
  # Her gün 00:00 UTC'de otomatik çalışır / runs automatically every day at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Actions sekmesinden elle tetiklenebilir / can be triggered manually from the Actions tab
  workflow_dispatch:
  # main dalına her push'ta çalışır / runs on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
